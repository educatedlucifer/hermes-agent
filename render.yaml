services:
  - type: web
    name: hermes-agent
    runtime: docker
    plan: free  # $7/mo, no sleep
    dockerfilePath: ./Dockerfile
    envVars:
      - key: OPENAI_API_BASE
        value: https://api.us-west-2.modal.direct/v1
      - key: OPENAI_API_KEY
        value: modalresearch_Skw49zxOJGISPgSkxw9J3S6HVDzlwjom7dFeUY59F_E
      - key: HERMES_MODEL
        value: zai-org/GLM-5.1-FP8
      - key: HERMES_TERMINAL_BACKEND
        value: docker
    disk:
      name: hermes-data
      mountPath: /root/.hermes
      sizeGB: 1
    healthCheckPath: /  # agar web endpoint nahi hai to remove karo
